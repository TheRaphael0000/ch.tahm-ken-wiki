services:
    tahmkenchwiki:
        image: mediawiki:1.45.3
        env_file:
            - .env
        restart: unless-stopped
        networks:
            - wiki
            - nginx
        volumes:
            - ./data/images:/var/www/html/images
            - ./branding:/var/www/html/resources/branding:ro
            - ./datadragon:/datadragon:ro
            - ./LocalSettings.php:/var/www/html/LocalSettings.php:ro
            - ./skins/mediawiki-skins-Citizen:/var/www/html/skins/Citizen:ro
            - ./extensions/HeadScript:/var/www/html/extensions/HeadScript:ro
            - ./robot.txt:/var/www/html/robot.txt:ro
        depends_on:
            database:
                condition: service_healthy
    database:
        image: mariadb:latest
        restart: always
        env_file:
            - .env
        networks:
            - wiki
        volumes:
            - ./data/db:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "--password=${MARIADB_ROOT_PASSWORD}"]
            interval: 5s
            timeout: 5s
            retries: 5

    # fix volume owner
    volume-fixer:
        image: mediawiki:1.45.3
        user: root
        volumes:
        - ./data/images:/var/www/html/images
        command: chown -R www-data:www-data /var/www/html/images

networks:
    wiki:
    nginx:
        external: true
        name: nginx
